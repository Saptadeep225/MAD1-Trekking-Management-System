{% extends "user/base.html" %}
{% block title %}
Profile
{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow-sm">
<div class="card-header">
<h4>
My Profile
</h4>

</div>
<div class="card-body">
<form method="POST">
<div class="mb-3">
<label>Name</label>
<input
type="text"
class="form-control"
name="name"
value="{{ current_user.name }}"
required>
</div>

<div class="mb-3">
<label>Email</label>
<input
type="email"
class="form-control"
name="email"
value="{{ current_user.email }}"
required>
</div>
<div class="mb-3">
<label>Phone</label>
<input
type="text"
class="form-control"
name="phone"
value="{{ current_user.phone }}">
</div>

<button class="btn btn-success">
Update Profile
</button>
</form>
</div>
</div>
</div>
</div>
{% endblock %}
