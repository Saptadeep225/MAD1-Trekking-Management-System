{% extends "user/base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header py-3 bg-white">
                <h4 class="mb-0 fw-bold" style="color: var(--primary)">Edit Profile Details</h4>
            </div>
            
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control" name="name" value="{{ current_user.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" class="form-control" name="email" value="{{ current_user.email }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="text" class="form-control" name="phone" value="{{ current_user.phone or '' }}" placeholder="Enter phone number">
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-custom px-4 fw-semibold">
                            Update Profile
                        </button>
                        <a href="{{ url_for('user.dashboard') }}" class="btn btn-outline-secondary px-4">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
